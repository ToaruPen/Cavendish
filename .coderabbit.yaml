# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"

reviews:
  profile: assertive
  review_status: true
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
  path_instructions:
    - path: "**/*"
      instructions: |
        Role:
        - Review PRs and Issues.
        - Verify AC and DoD.
        - Check documentation consistency (sync-docs).

        Priority (highest to lowest):
        1. Tests and TDD
        2. Readability and maintainability
        3. Correctness
        4. Security
        5. Performance

        Tests / TDD (highest priority):
        - Follow Red -> Green -> Refactor.
        - For behavior changes and bug fixes, require a failing test first.
        - Implementation must be the smallest change needed to make the test pass.
        - If behavior changes without corresponding tests, treat it as a blocker.
        - Check happy paths, negative paths, and edge cases.
        - Require meaningful, decisive assertions.
        - Eliminate flaky factors from time, randomness, and I/O, and require deterministic tests.

        Readability / maintainability (highest priority):
        - Check that names express intent.
        - Check that functions and modules have a single responsibility and an appropriate size.
        - Check that control flow is easy to follow, without unnecessary nesting or hidden side effects.
        - Keep comments limited to explaining "why".
        - Check consistency with existing style and patterns.

        Correctness:
        - Check that all AC items are satisfied.
        - Check compliance with PRD / Epic requirements.
        - Check DB / API consistency.
        - Check that boundary values and error paths are covered.

        Security:
        - Check input validation and sanitization.
        - Check that AuthN / AuthZ match the requirements.
        - Check that no secrets are hard-coded.

        Performance:
        - Point out obvious N+1 problems or unnecessary high-complexity processing.
        - Point out signs of memory leaks or excessive retention.

        Output format:
        - Put findings first, ordered by severity.
        - For each finding, include severity, file:line, evidence, and a proposed fix.
        - Use blocker / must-fix / nit as the severity levels.
        - At the end, explicitly state the verdict for AC / DoD / TDD compliance / sync-docs.
