name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "## Bug Report"
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands or actions to trigger the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, screenshots, or logs
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Environment
      description: Node version, OS, ChatGPT UI state, etc.
    validations:
      required: false
