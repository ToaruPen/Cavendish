name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    concurrency:
      group: publish-${{ github.ref }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Dead code check
        run: npm run deadcode:ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check publish version
        id: publish_guard
        run: node .github/scripts/check-publish-version.mjs

      - name: Publish
        if: steps.publish_guard.outputs.should_publish == 'true'
        run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip duplicate publish
        if: steps.publish_guard.outputs.should_publish != 'true'
        run: echo "${{ steps.publish_guard.outputs.reason }}"
